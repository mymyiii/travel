<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff8a3d"></stop>
      <stop offset="1" stop-color="#0b2447"></stop>
    </linearGradient>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"></feTurbulence>
      <feColorMatrix type="saturate" values="0"></feColorMatrix>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"></feFuncA>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- グラデ -->
  <rect width="100%" height="100%" fill="url(#g)"></rect>

  <!-- ノイズ -->
  <rect width="100%" height="100%" fill="#fff" opacity=".06" filter="url(#noise)"></rect>

  <!-- 波 -->
  <path d="M0 500 C180 440 250 620 430 545 C610 470 660 390 900 445 L900 650 L0 650 Z" fill="rgba(255,255,255,.18)"></path>
</svg>