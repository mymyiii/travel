<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>割り勘計算</title>
  <link rel="stylesheet" href="stylesheets/split.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">TRAVEL COST</p>
        <h1>割り勘計算</h1>
        <p>誰がいくら払ったかを入れると、最終的な精算額を自動計算します。</p>
      </div>
      <a class="backLink" href="./index.html">しおりへ</a>
    </header>

    <section class="summary">
      <div class="summaryCard orange">
        <span>合計</span>
        <strong id="totalAmount">¥0</strong>
      </div>
      <div class="summaryCard navy">
        <span>1人あたり</span>
        <strong id="perPerson">¥0</strong>
      </div>
    </section>

    <section class="card">
      <h2>メンバー</h2>
      <div class="row">
        <input id="personInput" type="text" placeholder="名前を追加">
        <button id="addPersonBtn">追加</button>
      </div>
      <div id="peopleList" class="chips"></div>
    </section>

    <section class="card">
      <h2 id="formTitle">支払いを追加</h2>

      <label>内容</label>
      <input id="expenseTitle" type="text" placeholder="例：ランチ、ホテル代">

      <label>金額</label>
      <input id="expenseAmount" type="number" inputmode="numeric" placeholder="例：3200">

      <label>払った人</label>
      <select id="payerSelect"></select>

      <label>メモ</label>
      <input id="expenseMemo" type="text" placeholder="任意">

      <div class="actions">
        <button id="saveExpenseBtn" class="primary">追加する</button>
        <button id="clearFormBtn">クリア</button>
      </div>
    </section>

    <section class="card">
      <h2>支払いリスト</h2>
      <div id="expenseList" class="expenseList"></div>
    </section>

    <section class="card">
      <h2>最終精算</h2>
      <div id="settlementList" class="settlementList"></div>
    </section>

    <section class="card">
      <h2>個人別の差額</h2>
      <div id="balanceList" class="balanceList"></div>
    </section>

    <button id="copyBtn" class="fixedBtn">結果をコピー</button>
  </main>

  <script src="service-worker.js"></script>
</body>
</html>
